# ---------------------------------------------------------------------------
# Scopes harvested from Wikidata external-identifier properties present on
# species items (taxonomic, nomenclatural, sequence, conservation and
# distribution/atlas authorities). The `wikidataProperty` field records the
# source Wikidata property (Pxxx). Prefixes reuse identifiers.org where one
# exists, otherwise a short readable scope derived from the authority name.
# Non-biodiversity identifiers from the same harvest are listed for review in
# wikidata-unmatched.tsv (not registered here).
# ---------------------------------------------------------------------------

- scope: abbbs
  title: 'ABBBS Taxon ID'
  wikidataProperty: P7093
