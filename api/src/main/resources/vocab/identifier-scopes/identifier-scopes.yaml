# Curated registry of identifier scopes used in CURIEs across ChecklistBank datasets.
# A scope is a short, case-insensitive string used as the prefix in `scope:id`.
# Source for the canonical list: https://github.com/CatalogueOfLife/coldp/blob/master/README.md#identifiers
# This file is checked into git and shipped on the classpath; the per-deployment
# datasetKey -> scope mapping lives in WsServerConfig.identifierScopes.
#
# Schema:
#   scope            unique short string (lowercased on load)
#   title            human-readable name
#   description      optional, short
#   link             optional, canonical homepage
#   resolver         optional, contains literal {id} placeholder
#   example          optional, sample local id
#   regex            optional, validates the local id
#   datasetKey       optional, projectKey in CLB (releases share their project's scope)
#   wikidataProperty optional, source Wikidata property id (Pxxx) the scope was harvested from

# generic schemes - not registered with a single authority
- scope: local
  title: Local identifier
  description: A local identifier with no public scope.

- scope: doi
  wikidataProperty: P356
  title: Digital Object Identifier
  link: https://www.doi.org
  resolver: https://doi.org/{id}
  example: 10.5281/zenodo.6407053

- scope: url
  title: URL
  description: An HTTP(S) or FTP URL used as an identifier.

- scope: urn
  title: Uniform Resource Name

- scope: lsid
  title: Life Science Identifier
  description: An OASIS LSID URN.
  example: urn:lsid:zoobank.org:act:6F2BC2EE-4F89-4D8A-A1A4-C2AEDF0C2A7A

- scope: isbn
  title: International Standard Book Number
  description: 10- or 13-digit International Standard Book Number.
  link: https://registry.identifiers.org/registry/isbn
  resolver: https://isbndb.com/book/{id}
  example: '9780393978674'

- scope: orcid
  title: Open Researcher and Contributor ID
  link: https://orcid.org
  resolver: https://orcid.org/{id}
  example: 0000-0001-6492-4016

- scope: viaf
  wikidataProperty: P214
  title: Virtual International Authority File
  link: https://viaf.org
  resolver: https://viaf.org/viaf/{id}
  example: '76389959'

- scope: wikidata
  title: Wikidata Q-identifiers
  link: https://www.wikidata.org
  resolver: https://www.wikidata.org/wiki/{id}
  example: Q157571

# taxonomic / nomenclatural authorities

- scope: algaebase
  title: AlgaeBase
  link: https://www.algaebase.org
  resolver: https://www.algaebase.org/search/species/detail/?species_id={id}
  example: '90'

- scope: avibase
  wikidataProperty: P2026
